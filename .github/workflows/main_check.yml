name: Fiscolia CI Checker

on: [push]

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files for debugging
        run : |
              echo "checking out code"
              ls -la
              echo "------------------------------"
              tree

      - name : Create env variables for docker environment
        env:
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: env | grep PROJECT_NAME



      - name: Create .env file and secrets
        run: |
          echo "${{ secrets.DB_AUTH_PWD }}" > secrets/db_auth_pwd.txt
          echo "${{ secrets.DB_ROOT_PWD }}" > secrets/db_root_pwd.txt
          echo "PROJECT_NAME=${{ vars.PROJECT_NAME }}" > .env
          echo "PROXY_EXPOSED_PORT=${{ vars.PROXY_EXPOSED_PORT }}" >> .env 
          echo "DB_AUTH_USER=${{ vars.DB_AUTH_USER }}" >> .env
          echo "DB_AUTH_SECRETS=${{ vars.DB_AUTH_SECRETS }}" >> .env
          echo "DB_AUTH_PORT=${{ vars.DB_AUTH_PORT }}" >> .env
          echo "DB_AUTH_NAME=${{ vars.DB_AUTH_NAME }}" >> .env
          echo "BACK_AUTH_PORT=${{ vars.BACK_AUTH_PORT }}" >> .env
          echo "BACK_UPLOAD_PORT=${{ vars.BACK_UPLOAD_PORT }}" >> .env
          echo "FRONT_PORT=${{ vars.FRONT_PORT }}" >> .env
          echo "POSTGRES_PASSWORD_FILE=${{ vars.POSTGRES_PASSWORD_FILE }}" >> .env
          echo "VERIFICATION .env FILE CONTENT"
          cat .env
          echo "VERIFICATION secrets FILE CONTENT"
          cat secrets/db_auth_pwd.txt
          cat secrets/db_root_pwd.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verification Python setup
        run : python --version

      - name : Build and start services
        run: make github-actions

      - name: Discord Notification on Failure
        if: failure()
        uses: rtCamp/action-discord-notifier@v1
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE:  |
            "❌ Fiscolia's CI  failed on the branch ${{ github.ref_name }} !"
            **Branche :** `${{ github.ref_name }}`
            **Commit :** `${{ github.sha }}`
            **Message :** ${{ github.event.head_commit.message }}
            **Auteur :** ${{ github.actor }}
            
            [👉 Voir l'erreur sur GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          TITLE: "Build Failure"
          COLOR: "#ff0000" # Rouge
      
      - name: Discord Notification on Success
        if: success()
        uses: rtCamp/action-discord-notifier@v1
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE: "✅ Fiscolia's CI  succeeded on the branch ${{ github.ref_name }} !"
          TITLE: "Build Success"
          COLOR: "#00ff00" # Vert

      - name: Stop services and clean up
        if: always()
        run: make fclean