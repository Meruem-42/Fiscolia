events {


}

http {

	server {
		listen 80;
		location / {
			proxy_pass http://frontend:5173;
		}
		location /api/auth-login {
			proxy_pass http://backend-auth:8000;
		}
		location /api/chatbot {
			proxy_pass http://backend-chatbot:8001;
		}
		location /api/auth-register {
			proxy_pass http://backend-auth:8000;
		}

	}

}

