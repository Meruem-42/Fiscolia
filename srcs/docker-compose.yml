services:
  frontend:
    container_name: ${PROJECT_NAME}-frontend
    image: frontend-image
    build:
      context: ./frontend
      args:
        FRONT_PORT: ${FRONT_PORT}
    networks:
      - fiscolia
    volumes:
      - ./frontend/srcs:/app/src:Z
    env_file:
      - ../.env
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "fiscolia-frontend"
        mode: non-blocking
    depends_on:
      logstash:
        condition: service_healthy


# TODO: PASSER NGINX EN SLIM
  proxy:
    container_name: ${PROJECT_NAME}-proxy
    image: proxy-image
    build: ./proxy
    ports:
      - ${PROXY_EXPOSED_PORT}:80
    networks:
      - fiscolia
    env_file:
      - ../.env
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "fiscolia-proxy"
        mode: non-blocking
    depends_on:
      frontend:
        condition: service_started
      backend-auth:
        condition: service_started
      logstash:
        condition: service_healthy


  backend-auth:
    container_name: ${PROJECT_NAME}-backend-auth
    image: backend-auth-image
    build: 
      context: ./backend-auth-login
      args:
        BACK_AUTH_PORT: ${BACK_AUTH_PORT}
    security_opt:
      - label:disable
    networks:
      - fiscolia
    env_file:
      - ../.env
    secrets:
      - db_auth_pwd
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "fiscolia-backend-auth"
        mode: non-blocking
    depends_on:
      db-auth:
        condition: service_healthy
      logstash:
        condition: service_healthy
  db-auth:
    container_name: ${PROJECT_NAME}-db-auth
    image: db-auth-image
    build:
      context: ./database-auth
      args:
        DB_AUTH_PORT: ${DB_AUTH_PORT}
    security_opt:
      - label:disable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p ${DB_AUTH_PORT} -U ${DB_AUTH_USER} -d ${DB_AUTH_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - fiscolia
    env_file:
      - ../.env
    secrets:
      - db_auth_pwd
      - db_root_pwd
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "fiscolia-db-auth"
        mode: non-blocking
    depends_on:
      logstash:
        condition: service_healthy

  # backend-upload:
  #   container_name: ${PROJECT_NAME}-backend-upload
  #   image: backend-upload-image
  #   build: ./backend-upload
  #   networks:
  #     - fiscolia
  #   env_file:
  #     - ../.env
  #   restart: unless-stopped

  logstash:
    container_name: ${PROJECT_NAME}-logstash
    image: logstash-image
    build: ./logs-logstash
    networks:
      - fiscolia
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:12201:12201/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600/"]
      timeout: 5s
      retries: 10
      start_period: 40s
      interval: 5s
    depends_on:
      elasticsearch:
        condition: service_healthy
  
  elasticsearch:
    container_name: ${PROJECT_NAME}-elasticsearch
    image: elasticsearch-image
    build: ./logs-elasticsearch
    expose:
      - 9200
    networks:
      - fiscolia
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Remove logging for elasticsearch to avoid circular dependency
    # logging:
    #   driver: gelf
    #   options:
    #     gelf-address: "udp://127.0.0.1:12201"
    #     tag: "fiscolia-elasticsearch"
    #     gelf-compression-type: "gzip"


  kibana:
    container_name: ${PROJECT_NAME}-kibana
    image: kibana-image
    build: ./logs-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://fiscolia-elasticsearch:9200
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    expose:
      - 5601
    networks:
      - fiscolia
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "fiscolia-kibana"
        mode: non-blocking
    depends_on:
      logstash:
        condition: service_healthy 


networks:
  fiscolia:
    name: fiscolia-network
    driver: bridge

secrets:
  db_auth_pwd:
    file: ../secrets/db_auth_pwd.txt
  db_root_pwd:
    file: ../secrets/db_root_pwd.txt
