server {
	listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate    /etc/nginx/ssl/fiscolia.crt;
    ssl_certificate_key /etc/nginx/ssl/fiscolia.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
	location / {
		proxy_pass http://frontend:${FRONT_PORT};
	}
	# location /api/upload {
	# 	proxy_pass http://backend-upload:${BACK_UPLOAD_PORT};
	# }
	location /api/auth-register {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/auth-login {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/auth-logout {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/me {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
}
