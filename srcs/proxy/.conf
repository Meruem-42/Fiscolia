server {
	listen 80;
	# resolver 10.89.0.1 ipv6=off valid=10s;
	resolver 127.0.0.11 ipv6=off valid=10s;
	location / {
		proxy_pass http://frontend:${FRONT_PORT};
	}
	# location /api/upload {
	# 	proxy_pass http://backend-upload:${BACK_UPLOAD_PORT};
	# }
	location /api/auth-register {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/auth-login {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/auth-logout {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/edit-profile {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/me {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
}
