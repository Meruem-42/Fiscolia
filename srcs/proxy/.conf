server {
	listen 80;
	location / {
		proxy_pass http://frontend:${FRONT_PORT};
	}
	# location /api/upload {
	# 	proxy_pass http://backend-upload:${BACK_UPLOAD_PORT};
	# }
	location /api/auth-register {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /api/auth-login {
		proxy_pass http://backend-auth:${BACK_AUTH_PORT};
	}
	location /kibana/ {
		proxy_pass http://fiscolia-kibana:5601;
		proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
	}
}

