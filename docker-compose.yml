services:
  frontend:
    container_name: frontend
    image: frontend-image
    build: ./frontend
    expose:
      - 5173
    networks:
      - fiscolia
    volumes:
      # - ./frontend/srcs/App.js:/app/src/App.jsx:Z
      # - ./frontend/srcs/index.css:/app/src/index.css:Z
      - ./frontend/srcs:/app/src:Z
    environment:
      - CHOWN=1


# TODO: PASSER NGINX EN SLIM
  nginx:
    container_name: nginx
    image: nginx-image
    build: ./server
    depends_on:
      frontend:
        condition: service_started
      backend-auth:
        condition: service_started
    ports:
      - 8080:80
    networks:
      - fiscolia
  backend-auth:
    container_name: backend-auth
    image: backend-auth-image
    build: ./backend-auth-login
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fiscolia

  backend-chatbot:
    container_name: backend-chatbot
    image: backend-chatbot-image
    build: ./backend-chatbot
    networks:
      - fiscolia   

  postgres:
    container_name: postgres
    image: postgres-image
    build: ./database-auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - fiscolia
    environment:
      - POSTGRES_PASSWORD=1234
      - POSTGRES_HOST_AUTH_METHOD=trust



networks:
  fiscolia:
    name: fiscolia-network
    driver: bridge
